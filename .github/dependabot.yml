---
version: 2
# opt in to updates for ecosystems that are not yet GA.
enable-beta-ecosystems: true
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions-deps:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore(deps): '

  # Maintain dependencies for cargo
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: 'chore(deps): '
    labels:
      - dependabot
      - dependencies
    open-pull-requests-limit: 5

  # Maintain dependencies for Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    groups:
      docker-deps:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore(deps): '

  # Maintain dependencies for Docker Compose
  - package-ecosystem: docker-compose
    directories:
      - '**/*'
    schedule:
      interval: monthly
    groups:
      docker-compose-deps:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore(deps): '

  # Maintain dependencies for npm
  - package-ecosystem: npm
    directories:
      - /examples/basic-example-plugin/test-plugin/
      - /examples/channels-plugin-example/channel/
      - /examples/channels-x402-plugin-example/channel/
      - /examples/launchtube-plugin-example/launchtube/
      - /examples/x402-facilitator-plugin/x402-facilitator/
      - /plugins/
    schedule:
      interval: monthly
    allow:
      - dependency-name: '*'
        dependency-type: production
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    groups:
      npm-deps:
        patterns:
          - '*'
        dependency-type: production
        group-by: dependency-name
    commit-message:
      prefix: 'chore(deps): '
    labels:
      - dependabot
      - dependencies
    open-pull-requests-limit: 5
