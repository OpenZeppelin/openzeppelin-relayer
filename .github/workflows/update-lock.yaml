---
name: Nightly Cargo.lock update
on:
  schedule:
    - cron: 0 12 * * *
  workflow_dispatch: {}
permissions:
  actions: read
  contents: write
  pull-requests: write
  id-token: write
jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Prepare
        id: init
        uses: ./.github/actions/prepare

      # Get the output of the prepare composite action
      - name: Get cache-hit output
        run: 'echo "Cache hit >>>>>: ${{ steps.init.outputs.cache-hit }}"'
      - name: Cargo Update
        id: lock-file-commit
        run: |-
          cargo update
          git add Cargo.lock
          if ! git diff --cached --quiet Cargo.lock; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "Cargo.lock has no changes, skipping commit and push."
            exit 0
          fi
      - name: Install cargo hack
        if: steps.lock-file-commit.outputs.changes == 'true'
        uses: taiki-e/install-action@7769b73c2ec98c38dfcf2e18c83cfd4880c038c1  # v2.75.27
        with:
          tool: cargo-hack
      - name: Check MSRV
        if: steps.lock-file-commit.outputs.changes == 'true'
        run: cargo hack check --feature-powerset --locked --rust-version --workspace --lib --bins
      - name: Create or update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'chore: Updating lock file'
          sign-commits: true
          branch: update-cargo-lock
          commit-message: 'chore: Updating lock file'
          body: |-
            This PR is generated automatically by GitHub Actions.
            It contains all dependency updates since the last run.
          base: main
          labels: dependencies, automation
