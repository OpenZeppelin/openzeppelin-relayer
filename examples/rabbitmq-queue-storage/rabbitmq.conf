# RabbitMQ configuration for the local example ONLY.
#
# By default the official image restricts the built-in `guest` user to loopback
# connections, so a relayer in a sibling container cannot authenticate as guest.
# Lifting that restriction keeps the example a single `docker compose up` with no
# user provisioning. DO NOT do this in production — create a dedicated user with
# scoped permissions and use amqps:// (see the README "Production notes").
loopback_users = none
