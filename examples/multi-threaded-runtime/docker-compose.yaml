---
# Multi-threaded runtime example.
#
# Runs the relayer on its explicit multi-thread tokio pipeline runtime against a
# local anvil node and Redis (the apalis queue backend). Used to exercise and
# *observe* the runtime migration — in particular to validate that apalis queue
# workers distribute across worker threads instead of pinning to one (spec D8 / T004).
version: '3.9'
services:
  relayer:
    build:
      context: ../../
      dockerfile: Dockerfile.development
    ports:
      - 8080:8080/tcp
      - 8081:8081/tcp
    secrets:
      - api_key
      - webhook_signing_key
      - keystore_passphrase
    environment:
      REDIS_URL: redis://redis:6379
      QUEUE_BACKEND: redis
      RATE_LIMIT_REQUESTS_PER_SECOND: 1000
      RATE_LIMIT_BURST: 2000
      WEBHOOK_SIGNING_KEY: ${WEBHOOK_SIGNING_KEY}
      API_KEY: ${API_KEY}
      KEYSTORE_PASSPHRASE: ${KEYSTORE_PASSPHRASE}
      # ── Multi-thread runtime sizing ────────────────────────────────────────
      # Pin both runtimes to fit the container's vCPU quota. Pick values whose sum
      # is <= the CPUs you give the container (see `deploy.resources` below).
      TOKIO_WORKER_THREADS: ${TOKIO_WORKER_THREADS:-4}
      ACTIX_WORKERS: ${ACTIX_WORKERS:-2}
      # ── Observability for the T004 distribution check ──────────────────────
      # JSON logs include the OS thread id on every line (with_thread_ids), which is
      # how we confirm pipeline work spreads across threads. Metrics expose the
      # `worker_threads` gauge on :8081.
      LOG_FORMAT: json
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: 'true'
    security_opt:
      - no-new-privileges
    networks:
      - relayer-network
    volumes:
      - ./config:/app/config/
      - ../../config/networks:/app/config/networks
    depends_on:
      - redis
      - anvil
    restart: on-failure:5
    # Give the container a few cores so worker_threads + actix_workers have room.
    deploy:
      resources:
        limits:
          cpus: '6'
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    # 1s blocks; --silent keeps anvil's own logs out of the way.
    entrypoint:
      - anvil
      - --host
      - 0.0.0.0
      - --block-time
      - '1'
      - --silent
    ports:
      - 8545:8545/tcp
    networks:
      - relayer-network
    restart: on-failure:5
  redis:
    image: redis:bookworm
    security_opt:
      - no-new-privileges
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - 'yes'
    networks:
      - relayer-network
    restart: on-failure:5
networks:
  relayer-network:
    driver: bridge
volumes:
  redis_data:
    driver: local
secrets:
  api_key:
    environment: API_KEY
  webhook_signing_key:
    environment: WEBHOOK_SIGNING_KEY
  keystore_passphrase:
    environment: KEYSTORE_PASSPHRASE
